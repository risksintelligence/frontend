name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://backend-9t5o.onrender.com/api/v1
          NEXT_PUBLIC_REVIEWER_API_KEY: test_reviewer_key
          NEXT_PUBLIC_BASE_URL: https://frontend-9t5o.onrender.com
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Start development server
        run: |
          npm run dev &
          sleep 10
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:3000/
        env:
          CI: true
          NEXT_PUBLIC_API_BASE_URL: https://backend-9t5o.onrender.com/api/v1
          NEXT_PUBLIC_REVIEWER_API_KEY: test_reviewer_key
          NEXT_PUBLIC_BASE_URL: https://frontend-9t5o.onrender.com
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: https://backend-9t5o.onrender.com/api/v1
          NEXT_PUBLIC_REVIEWER_API_KEY: test_reviewer_key
          NEXT_PUBLIC_BASE_URL: https://frontend-9t5o.onrender.com
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d4cf70fdiees739303r0?key=0lc_KmWW_4A"
